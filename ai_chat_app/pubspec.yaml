name: ai_chat_app
description: AI Chat Application with Flutter and Riverpod
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # HTTP 客户端
  http: ^1.2.0
  
  # Markdown 渲染
  flutter_markdown: ^0.6.18
  markdown: ^7.2.1
  
  # 代码高亮
  highlight: ^0.7.0
  
  # 用户认证
  shared_preferences: ^2.2.2
  
  # UI 组件
  cupertino_icons: ^1.0.6
  
  # 时间格式化
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/
